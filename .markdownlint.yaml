# Markdownlint configuration
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Auto-generated files (regenerated by scripts, not authored by hand)
ignores:
  - THIRD-PARTY-LICENSES.md
  - website/docs/third-party-licenses.md
  - website/docs/changelog.md

# Default state for all rules
default: true

# MD013 — Line length
MD013:
  line_length: 120
  heading_line_length: 120
  code_blocks: false  # code blocks shouldn't be wrapped

# MD033 — Inline HTML
MD033: false

# MD041 — First line in file should be a heading
# Allows YAML frontmatter (---) in skill/command files
MD041: false

# MD046 — Code block style
MD046: false

# MD024 — No duplicate headings
# CHANGELOGs have repeated version headings
MD024: false

# MD012 — No multiple consecutive blank lines
MD012: true

# MD022 — Headings should be surrounded by blank lines
MD022: true

# MD023 — Headings must be at the beginning of the line
MD023: true

# MD025 — Single h1 heading
MD025: false

# MD026 — No trailing punctuation in headings
MD026:
  punctuation: ".,;:!。，；：！？"

# MD028 — Blank line inside code block
MD028: true

# MD029 — Ordered list item prefix
MD029: false

# MD031 — Fenced code blocks should be surrounded by blank lines
MD031: true

# MD032 — Lists should be surrounded by blank lines
MD032: true

# MD034 — Bare URL used
MD034: true

# MD036 — Emphasis used instead of a heading
MD036: false

# MD037 — Spaces inside emphasis markers
MD037: true

# MD038 — Spaces inside code span elements
MD038: true

# MD039 — Spaces inside link text
MD039: true

# MD040 — Fenced code blocks should have a language
MD040: true

# MD042 — No empty links
MD042: true

# MD043 — Required heading structure
MD043: false

# MD044 — Proper names should be capitalized
MD044: false

# MD045 — Images should have alt text
MD045: true

# MD047 — Single trailing newline
MD047: true

# MD048 — Code fence style
MD048:
  style: backtick

# MD049 — Emphasis style
MD049: false

# MD050 — Strong style
MD050: false

# MD051 — Link fragments should be valid
MD051: true

# MD052 — Reference links should use defined labels
MD052: false

# MD053 — Link and image reference definitions should be needed
MD053: false
