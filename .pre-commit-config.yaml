# Local git hooks for llmenv, managed by prek (https://github.com/j178/prek).
# Install after cloning:  prek install --hook-type pre-commit
#
# Only fmt runs locally (fast). Clippy, tests, and cargo-deny run in CI only.
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        stages: [pre-commit]
