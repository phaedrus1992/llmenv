cache:
  cache_dir: "~/.cache/llmenv"
  sync_interval_minutes: 15

scope:
  network:
    - id: home
      match:
        gateway_mac: "aa:bb:cc:dd:ee:ff"
      tags: [home]
  host:
    - id: fixed
      match:
        hostname: fixed
      tags: [icm-server]
  user:
    - id: breed
      match:
        user: breed
      tags: [base]

bundle:
  - name: base
    tags: [base]
  - name: rust-defaults
    tags: [rust]

host:
  fixed:
    addr: "fixed.local"

mcp:
  - name: playwright
    tags: [base]
    command: npx
    args: ["-y", "@playwright/mcp@latest"]

marketplace:
  - name: superpowers
    source: "https://github.com/obra/superpowers"
  - name: dev-commons
    source: "~/git/dev-commons"

plugin-collection:
  - name: core
    tags: [base]
    plugins: ["superpowers:caveman"]
  - name: rust-tools
    tags: [rust]
    plugins: ["dev-commons:rust-tooling", "superpowers:tdd"]

features:
  memory:
    - server_host: fixed
      port: 7878
      tags: [base]
      default_topics: ["context-{project}", preferences]
