cache:
  cache_dir: "~/.cache/llmenv"
  sync_interval_minutes: 15

scope:
  network:
    - id: home
      match:
        gateway_mac: "aa:bb:cc:dd:ee:ff"
      tags: [home]
  host:
    - id: fixed
      match:
        hostname: fixed
      tags: [icm-server]
  user:
    - id: breed
      match:
        user: breed
      tags: [base]
  project:
    - id: phaedrus
      match:
        path_prefix: "~/git/phaedrus"
      tags: [phaedrus, rust]

bundle:
  - name: base
    tags: [base]
  - name: rust-defaults
    tags: [rust]

host:
  fixed:
    addr: "fixed.local"

mcp:
  - name: playwright
    tags: [base]
    command: npx
    args: ["-y", "@playwright/mcp@latest"]

memory:
  server_host: fixed
  port: 7878
  tags: [base]
  default_topics: ["context-{project}", preferences]
