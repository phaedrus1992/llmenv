# markdownlint-cli2 configuration
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Auto-generated files (regenerated by scripts, not authored by hand)
ignores:
  - "THIRD-PARTY-LICENSES.md"
  - "website/docs/third-party-licenses.md"
  - "website/docs/changelog.md"
  - ".claude/"
  - ".superpowers/"
  - ".tmp/"
  - "node_modules/"
  - "website/node_modules/"
  - "tests/fixtures/"
  - "docs/design/"
  - "docs/superpowers/"

config:
  # Line length
  MD013:
    line_length: 120
  # Keep a Changelog repeats ### Added/Changed/Fixed/etc. under every
  # version heading; only flag duplicates within the same parent section.
  MD024:
    siblings_only: true
