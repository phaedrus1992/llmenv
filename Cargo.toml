[package]
name = "llmenv"
version = "1.0.0-rc1"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
description = "Universal scope-aware environment for AI coding agents"
repository = "https://github.com/phaedrus1992/llmenv"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml = { package = "serde_yaml_ng", version = "0.10" }
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "fs", "process", "io-util"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
thiserror = "2.0"
anyhow = "1.0"
directories = "6"
sha2 = "0.11"
hex = "0.4"
humantime = "2.1"
anstream = "0.6"
anstyle = "1.0"
glob = "0.3"
reqwest = { version = "0.13", default-features = false, features = ["rustls", "json"] }
url = "2.5"

[dev-dependencies]
assert_cmd = "2.2"
insta = { version = "1.47", features = ["yaml"] }
tempfile = "3.27"
predicates = "3.1"
walkdir = "2.5"
proptest = "1.5"
criterion = { version = "0.5", features = ["html_reports"] }
wiremock = "0.6"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[[bench]]
name = "cli_benchmark"
harness = false
