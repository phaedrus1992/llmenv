name: coverage
on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/coverage.yml'
permissions:
  contents: read
env:
  # Serialize rustup's component writes; parallel installs trip the runner's
  # virtualized disk (os error 5, #553). Inert for steps that don't call rustup.
  RUSTUP_IO_THREADS: "1"
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov
      - name: Detect CPU count
        run: echo "CARGO_BUILD_JOBS=$(scripts/core_count.sh)" >> "$GITHUB_ENV"
      # Print the per-file summary to the job log and fail if total line
      # coverage drops below the baseline minus tolerance. Baseline at the
      # time this landed was 65.12%; see issue #57. No external service.
      - run: cargo llvm-cov --all-features --summary-only --fail-under-lines 64
