name: coverage
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014  # v2.7.5
      - uses: taiki-e/install-action@8f531eaecd1898bc3da7d104ad91bee98d1b97bd # v2.79.9
        with:
          tool: cargo-llvm-cov
      # Print the per-file summary to the job log and fail if total line
      # coverage drops below the baseline minus tolerance. Baseline at the
      # time this landed was 65.12%; see issue #57. No external service.
      - run: cargo llvm-cov --all-features --summary-only --fail-under-lines 64
