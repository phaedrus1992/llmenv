name: Forward-merge release branches

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: forward-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  forward-merge:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901eba7c1f0604a2f1cb79b3195f8f0cf9 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect release branches
        id: detect
        run: |
          set -euo pipefail
          CURRENT=$(git rev-parse --abbrev-ref HEAD)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          BRANCHES=$(git branch -r | grep 'origin/release/[0-9]*\.[0-9]*\.x$' | sed 's|origin/||' | sort -V)
          echo "branches<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BRANCHES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Ensure label exists
        continue-on-error: true
        run: |
          gh label create forward-merge-conflict \
            --description "Conflict in forward-merge release cascade" \
            --color "d73a4a" || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Forward-merge cascade
        env:
          CURRENT: ${{ steps.detect.outputs.current }}
          BRANCHES: ${{ steps.detect.outputs.branches }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Build target list
          TARGETS=()
          FOUND=0
          while IFS= read -r BRANCH; do
            if [[ "$FOUND" -eq 1 ]]; then
              TARGETS+=("$BRANCH")
            fi
            if [[ "$BRANCH" == "$CURRENT" ]]; then
              FOUND=1
            fi
          done <<< "$BRANCHES"
          TARGETS+=("main")

          # Process each target
          for TARGET in "${TARGETS[@]}"; do
            echo "::group::Forward-merge $CURRENT → $TARGET"
            TARGET_SHA=$(git rev-parse "origin/$TARGET" 2>/dev/null || echo "")
            CURRENT_SHA=$(git rev-parse "origin/$CURRENT")

            if [[ "$TARGET_SHA" == "$CURRENT_SHA" ]]; then
              echo "Target $TARGET already up to date"
              echo "::endgroup::"
              continue
            fi

            git fetch origin "$CURRENT" "$TARGET" 2>/dev/null || true
            git checkout -q "origin/$TARGET"

            if ! git merge --no-commit --no-ff "origin/$CURRENT" 2>/dev/null; then
              git merge --abort || true
              MERGE_BRANCH="forward-merge/$CURRENT-to-$TARGET"
              git checkout -b "$MERGE_BRANCH" "origin/$TARGET"
              git reset --hard "origin/$TARGET"
              git merge "origin/$CURRENT" || true
              git push origin "$MERGE_BRANCH" -f

              BODY="Forward-merge conflict between $CURRENT and $TARGET. Resolve and merge."
              gh pr create --base "$TARGET" --head "$MERGE_BRANCH" \
                --title "Merge $CURRENT into $TARGET (conflicts)" \
                --body "$BODY" \
                --label "forward-merge-conflict" || true

              echo "Cascade halted at conflict"
              echo "::endgroup::"
              exit 0
            fi

            git merge --abort || true

            if [[ "$TARGET" == "main" ]]; then
              MERGE_BRANCH="forward-merge/$CURRENT-to-$TARGET"
              git checkout -b "$MERGE_BRANCH" "origin/$TARGET"
              git merge -m "Forward-merge $CURRENT into $TARGET" "origin/$CURRENT"
              git push origin "$MERGE_BRANCH"

              gh pr create --base "$TARGET" --head "$MERGE_BRANCH" \
                --title "Forward-merge $CURRENT into $TARGET" \
                --body "Automatic forward-merge of $CURRENT into $TARGET" || true
            else
              git checkout -q "origin/$TARGET"
              git merge --no-edit "origin/$CURRENT"

              if git push origin HEAD:"$TARGET" 2>/dev/null; then
                echo "Pushed directly to $TARGET"
              else
                MERGE_BRANCH="forward-merge/$CURRENT-to-$TARGET"
                git checkout -b "$MERGE_BRANCH" "origin/$TARGET"
                git push origin "$MERGE_BRANCH"

                gh pr create --base "$TARGET" --head "$MERGE_BRANCH" \
                  --title "Forward-merge $CURRENT into $TARGET" \
                  --body "Direct push blocked by branch protection; opening PR." || true

                echo "Cascade halted (branch protected)"
                echo "::endgroup::"
                exit 0
              fi
            fi

            echo "::endgroup::"
          done

          echo "Forward-merge cascade completed"
