name: Forward-merge release branches

on:
  push:
    branches:
      - 'release/**'

# Default to read-only; the job that needs write declares it explicitly.
permissions:
  contents: read

concurrency:
  group: forward-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  forward-merge:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect release branches
        id: detect
        run: |
          set -euo pipefail
          CURRENT=$(git rev-parse --abbrev-ref HEAD)
          # `git branch -r` indents each line with two spaces; strip that (and the
          # `origin/` prefix) before matching, otherwise the cascade compares
          # "  release/1.x" against "release/1.x", never matches the current
          # branch, and aborts with "not a versioned release branch".
          BRANCHES=$(git branch -r | sed 's|^[[:space:]]*origin/||' \
            | grep -E '^release/[0-9]+\.x$' | sort -V)
          # Random delimiter so a branch literally named "EOF" can't break the
          # multiline output value (GitHub-recommended pattern).
          DELIM="branches-$(uuidgen)"
          {
            echo "current=$CURRENT"
            echo "branches<<$DELIM"
            echo "$BRANCHES"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure label exists
        continue-on-error: true
        run: |
          gh label create forward-merge-conflict \
            --description "Conflict in forward-merge release cascade" \
            --color "d73a4a" || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Forward-merge cascade
        env:
          CURRENT: ${{ steps.detect.outputs.current }}
          BRANCHES: ${{ steps.detect.outputs.branches }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Build target list: every newer release branch (semver order) + main.
          TARGETS=()
          FOUND=0
          while IFS= read -r BRANCH; do
            if [[ "$FOUND" -eq 1 ]]; then
              TARGETS+=("$BRANCH")
            fi
            if [[ "$BRANCH" == "$CURRENT" ]]; then
              FOUND=1
            fi
          done <<< "$BRANCHES"

          # Guard: the pushed branch must be a recognized versioned release line.
          # The trigger (release/**) is broader than the X.x regex, so a branch
          # like release/foo would otherwise fall through and merge into main.
          if [[ "$FOUND" -eq 0 ]]; then
            echo "::warning::$CURRENT is not a versioned release/X.x branch; skipping cascade"
            exit 0
          fi

          TARGETS+=("main")

          # Track whether the cascade halted early so the run fails visibly
          # rather than silently leaving downstream targets unmerged.
          HALTED=""

          # Abort on conflict — never commit a broken merge or push a conflict
          # branch. The cascade exits with a clear error so whoever pushed to the
          # release branch resolves manually.
          bail_on_conflict() {
            local src="$1" tgt="$2"
            echo "::error::Merge conflict: $src into $tgt has conflicts. Resolve manually:"
            echo "::error::  git checkout $tgt && git merge $src"
            echo "::error::Cascade halted; downstream targets not merged"
            return 1
          }

          for TARGET in "${TARGETS[@]}"; do
            echo "::group::Forward-merge $CURRENT → $TARGET"
            TARGET_SHA=$(git rev-parse "origin/$TARGET" 2>/dev/null || echo "")
            CURRENT_SHA=$(git rev-parse "origin/$CURRENT")

            if [[ "$TARGET_SHA" == "$CURRENT_SHA" ]]; then
              echo "Target $TARGET already up to date"
              echo "::endgroup::"
              continue
            fi

            FETCH_STDERR=$(git fetch origin "$CURRENT" "$TARGET" 2>&1 >/dev/null)
            FETCH_RC=$?
            if [[ $FETCH_RC -ne 0 ]]; then
              if [[ -n "$FETCH_STDERR" ]]; then
                echo "::warning::fetch of $CURRENT $TARGET failed: ${FETCH_STDERR//$'\n'/ }"
              else
                echo "::warning::fetch of $CURRENT $TARGET failed (exit $FETCH_RC; no stderr)"
              fi
              echo "::endgroup::"
              HALTED="fetch failed for $TARGET"
              break
            fi

            git checkout -q "origin/$TARGET"

            MERGE_BRANCH="forward-merge/$CURRENT-to-$TARGET"

            if ! git merge --no-commit --no-ff "origin/$CURRENT" 2>/dev/null; then
              # website/docs/changelog.md is a generated artifact (from scripts/sync-changelog-doc.sh)
              # that almost always conflicts on forward-merge. If it's the only conflicted file,
              # resolve by regenerating from the merged CHANGELOG-*.md sources and continue.
              CONFLICTED=$(git diff --name-only --diff-filter=U)
              if echo "$CONFLICTED" | grep -q "^website/docs/changelog.md$" \
                  && [ "$(echo "$CONFLICTED" | wc -l)" -eq 1 ]; then
                echo "Resolving website/docs/changelog.md conflict: regenerating from merged CHANGELOG-*.md"
                git checkout --ours website/docs/changelog.md
                bash scripts/sync-changelog-doc.sh
                git add website/docs/changelog.md
                if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
                  git merge --abort
                  bail_on_conflict "$CURRENT" "$TARGET" || true
                  echo "::endgroup::"
                  HALTED="conflict at $TARGET"
                  break
                fi
                git commit --no-edit
              else
                if ! git merge --abort; then
                  echo "::error::Failed to abort merge; working tree may be inconsistent"
                  echo "::endgroup::"
                  HALTED="merge abort failed at $TARGET"
                  break
                fi
                bail_on_conflict "$CURRENT" "$TARGET" || true
                echo "::endgroup::"
                HALTED="conflict at $TARGET"
                break
              fi
            else
              if ! git merge --abort; then
                echo "::error::Failed to abort merge; working tree may be inconsistent"
                echo "::endgroup::"
                HALTED="merge abort failed at $TARGET"
                break
              fi
              git checkout -q "origin/$TARGET"
              if ! git merge --no-edit "origin/$CURRENT"; then
                echo "::error::Failed to merge $CURRENT into $TARGET"
                echo "::endgroup::"
                HALTED="merge failed at $TARGET"
                break
              fi
            fi

            # Land the merge directly so the fix propagates automatically — main
            # is the final target and is forward-merged the same way as every
            # release branch, with no manual step. If a target is branch-protected
            # the push is rejected; fall back to opening a PR and halt so the
            # remaining (now un-merged) targets aren't silently skipped.
            PUSH_STDERR=$(git push origin HEAD:"$TARGET" 2>&1 >/dev/null)
            PUSH_RC=$?
            if [[ $PUSH_RC -eq 0 ]]; then
              echo "Pushed directly to $TARGET"
            else
              # Log the actual error so operators can distinguish protection
              # rejections from auth/network failures.
              if [[ -n "$PUSH_STDERR" ]]; then
                echo "::warning::push to $TARGET failed: ${PUSH_STDERR//$'\n'/ }"
              else
                echo "::warning::push to $TARGET failed (exit $PUSH_RC; no stderr)"
              fi
              git ls-remote --exit-code --heads origin "$MERGE_BRANCH" >/dev/null 2>&1
              ls_rc=$?
              if [[ $ls_rc -eq 0 ]]; then
                echo "::warning::$MERGE_BRANCH already exists; not overwriting in-progress resolution"
                echo "::error::Cascade halted: $TARGET is protected and $MERGE_BRANCH is already open"
                echo "::endgroup::"
                HALTED="protected branch $TARGET"
                break
              elif [[ $ls_rc -ne 2 ]]; then
                echo "::error::Network error checking if $MERGE_BRANCH exists (exit $ls_rc); halting cascade"
                echo "::endgroup::"
                HALTED="network error at $TARGET"
                break
              fi

              # Create branch pointing to current HEAD (the merge commit at line 205),
              # not origin/$TARGET (which would discard the merge commit).
              if ! git checkout -B "$MERGE_BRANCH"; then
                echo "::error::Failed to create merge branch $MERGE_BRANCH"
                echo "::endgroup::"
                HALTED="checkout failed at $TARGET"
                break
              fi
              if ! git push origin "$MERGE_BRANCH" --force-with-lease; then
                echo "::error::Push to merge branch $MERGE_BRANCH failed; cannot open PR"
                echo "::endgroup::"
                HALTED="protected branch $TARGET"
                break
              fi

              if ! gh pr create --base "$TARGET" --head "$MERGE_BRANCH" \
                --title "Forward-merge $CURRENT into $TARGET" \
                --body "Direct push to $TARGET blocked by branch protection; opening PR."; then
                echo "::error::Failed to create PR for $MERGE_BRANCH after protected-branch push was rejected"
              else
                echo "::error::Cascade halted: $TARGET is protected, opened PR instead"
              fi
              echo "::endgroup::"
              HALTED="protected branch $TARGET"
              break
            fi

            echo "::endgroup::"
          done

          if [[ -n "$HALTED" ]]; then
            echo "Forward-merge cascade halted ($HALTED); downstream targets not merged"
            exit 1
          fi

          echo "Forward-merge cascade completed"
