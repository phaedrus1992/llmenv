name: ci
on:
  push:
    paths:
      - 'src/**'
      - 'crates/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'crates/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/ci.yml'
permissions:
  contents: read
env:
  # Serialize rustup's component writes; parallel installs trip the runner's
  # virtualized disk (os error 5, #553). Inert for steps that don't call rustup.
  RUSTUP_IO_THREADS: "1"
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      # Cache the rustup toolchain itself — Swatinem/rust-cache below only
      # covers ~/.cargo and target/. A hit lets rustup skip the component
      # download that intermittently fails on macos runners with
      # "Input/output error (os error 5)" (#553). Must run before the
      # toolchain step so a restored toolchain short-circuits the install.
      # Split restore/save (instead of the combined action) and gate the
      # save on the verify step below: the combined action's save runs
      # unconditionally during job cleanup even if a later step fails, which
      # would let a toolchain corrupted by that same os-error-5 permanently
      # poison the cache under this key.
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        id: rustup-cache
        with:
          path: &rustup-cache-path |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
            ~/.rustup/settings.toml
          # Keep toolchain + components in the key in sync with the step below.
          key: &rustup-cache-key rustup-${{ matrix.os }}-${{ hashFiles('rust-toolchain.toml') }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: 1.95
          components: rustfmt, clippy
      - run: rustc --version && cargo fmt --version && cargo clippy --version
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        if: steps.rustup-cache.outputs.cache-hit != 'true'
        with:
          path: *rustup-cache-path
          key: *rustup-cache-key
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25  # v2
        with:
          tool: cargo-nextest
      - name: Detect CPU count
        run: echo "CARGO_BUILD_JOBS=$(scripts/core_count.sh)" >> "$GITHUB_ENV"
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo nextest run --workspace --test-threads "$CARGO_BUILD_JOBS"
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2.0.20
        with:
          command: check
