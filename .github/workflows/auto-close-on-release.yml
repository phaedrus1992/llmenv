name: Auto-close issues on release/* branch merges

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/**'

permissions:
  issues: write

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close linked issues
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            // Match "Closes #N", "Fixes #N", "Resolves #N" (case-insensitive, various tenses)
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issues = new Set();
            let match;
            while ((match = re.exec(body)) !== null) {
              issues.add(parseInt(match[1], 10));
            }

            for (const issueNum of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                state: 'closed',
              });
              console.log(`Closed issue #${issueNum}`);
            }

            if (issues.size === 0) {
              console.log('No issues found in PR body to close.');
            }
