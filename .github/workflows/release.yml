name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: llmenv
            asset_name: llmenv-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-aarch64
    outputs:
      checksums: ${{ steps.checksum.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install cross-compile target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "${TARGET}"
      # zizmor: ignore[cache-poisoning] — cache is skipped on tag pushes via `if:`
      # below; the conditional guard makes the cache-poisoning audit a false
      # positive (zizmor static analysis doesn't trace step-level conditionals).
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          cache-on-failure: false
      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "${TARGET}"
      - name: Strip binary
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: strip "target/${TARGET}/release/${ARTIFACT_NAME}" || true
      - name: Create asset directory
        run: mkdir -p assets
      - name: Copy binary
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: cp "target/${TARGET}/release/${ARTIFACT_NAME}" "assets/${ASSET_NAME}"
      - name: Compute SHA256
        id: checksum
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          cd assets
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          {
            echo "hashes<<EOF"
            cat "${ASSET_NAME}.sha256"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: assets/${{ matrix.asset_name }}
      - name: Upload checksum artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}-sha256
          path: assets/${{ matrix.asset_name }}.sha256
      - name: Generate SLSA provenance
        id: slsa
        env:
          ARTIFACT_NAME: ${{ matrix.asset_name }}
          GH_REF: ${{ github.ref }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACT_HASH=$(sha256sum assets/"${ARTIFACT_NAME}" | awk '{print $1}')
          export ARTIFACT_HASH
          PROVENANCE_FILE="${ARTIFACT_NAME}.intoto.jsonl"
          export PROVENANCE_FILE

          python3 << 'PYTHON_EOF'
          import json
          import datetime
          import os

          artifact_hash = os.environ['ARTIFACT_HASH']
          artifact_name = os.environ['ARTIFACT_NAME']
          gh_ref = os.environ['GH_REF']
          gh_repo = os.environ['GH_REPO']
          gh_sha = os.environ['GH_SHA']
          gh_run_id = os.environ['GH_RUN_ID']

          provenance = {
            '_type': 'https://slsa.dev/provenance/v1',
            'subject': [{'name': artifact_name, 'digest': {'sha256': artifact_hash}}],
            'predicateType': 'https://slsa.dev/provenance/v1',
            'predicate': {
              'buildDefinition': {
                'buildType': 'https://github.com/slsa-framework/slsa-github-generator/blob/main/internal/builders/docker/v1',
                'externalParameters': {
                  'workflow': {
                    'path': '.github/workflows/release.yml',
                    'ref': gh_ref,
                    'repository': gh_repo
                  }
                },
                'internalParameters': {'source-commit': gh_sha},
                'resolvedDependencies': []
              },
              'runDetails': {
                'builder': {'id': 'https://github.com/slsa-framework/slsa-github-generator/releases/tag/v2.0.0'},
                'buildMetadata': {
                  'invocationId': gh_run_id,
                  'startedOn': datetime.datetime.utcnow().isoformat() + 'Z',
                  'completedOn': datetime.datetime.utcnow().isoformat() + 'Z'
                },
                'byproducts': []
              }
            }
          }
          with open(os.environ['PROVENANCE_FILE'], 'w') as f:
            json.dump(provenance, f)
          PYTHON_EOF

          echo "provenance_file=${PROVENANCE_FILE}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_HASH=${ARTIFACT_HASH}" >> "$GITHUB_ENV"
      - name: Upload provenance artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}-provenance
          path: ${{ steps.slsa.outputs.provenance_file }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
      - name: Extract version from tag
        id: version
        env:
          GH_REF: ${{ github.ref }}
        run: |
          VERSION="${GH_REF#refs/tags/v}"
          # Constrain to a version-shaped token so it can't smuggle path or shell
          # metacharacters into the crates.io URL below.
          if [[ ! "${GH_REF}" =~ ^refs/tags/v ]] || [[ ! "${VERSION}" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "Error: not a valid release tag: ${GH_REF}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Idempotent publish: if this version is already on crates.io, skip
          # instead of failing. crates.io rejects re-uploads, so without this a
          # re-pushed tag (e.g. recovering from a later-stage failure) would
          # hard-fail here and block the GitHub release that now gates on it.
          STATUS=$(curl -sS -A 'llmenv-release-workflow' -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/llmenv/${VERSION}")
          case "${STATUS}" in
            200)
              echo "llmenv ${VERSION} already on crates.io; skipping publish."
              ;;
            404)
              cargo publish
              ;;
            *)
              echo "Error: unexpected crates.io status ${STATUS} checking llmenv ${VERSION}" >&2
              exit 1
              ;;
          esac

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Gate on publish-crate so crates.io is the source of truth: a failed crate
    # publish must block the GitHub release and Homebrew bump, not race them.
    needs: [build-binaries, publish-crate]
    permissions:
      contents: write
    outputs:
      release_version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: assets
      - name: Prepare release assets
        run: |
          mkdir -p release-assets checksums provenance
          find assets -type f -name 'llmenv-*' ! -name '*.sha256' ! -name '*.intoto.jsonl' \
            -exec mv {} release-assets/ \;
          find assets -type f -name '*.sha256' -exec mv {} checksums/ \;
          find assets -type f -name '*.intoto.jsonl' -exec mv {} provenance/ \;
          cd checksums && cat -- *.sha256 > checksums.txt && cd ..
      - name: Extract version from tag
        id: extract_version
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [[ ! "${GH_REF}" =~ ^refs/tags/v ]]; then
            echo "Error: Not a release tag" >&2
            exit 1
          fi
          VERSION="${GH_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            release-assets/llmenv-*
            checksums/checksums.txt
            provenance/*.intoto.jsonl
          draft: false
          prerelease: false
          body: |
            ## Binary Checksums

            Verify binary integrity:
            ```bash
            sha256sum -c checksums.txt
            ```

            ## Supply Chain Security

            SLSA v1.0 provenance attestations are included in this release. Verify authenticity:
            ```bash
            slsa-verifier verify-artifact --artifact-path=<binary> --provenance=<provenance.intoto.jsonl> --source-uri=github.com/phaedrus1992/llmenv
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
      - name: Extract and validate checksums
        id: checksums
        run: |
          # Extract checksums with validation
          LINUX_X64=$(grep -h -F 'llmenv-linux-x86_64' \
            "artifacts/llmenv-linux-x86_64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          MACOS_X64=$(grep -h -F 'llmenv-macos-x86_64' \
            "artifacts/llmenv-macos-x86_64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          MACOS_ARM=$(grep -h -F 'llmenv-macos-aarch64' \
            "artifacts/llmenv-macos-aarch64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')

          # Validate all checksums present and format (64 hex digits)
          for checksum in "$LINUX_X64" "$MACOS_X64" "$MACOS_ARM"; do
            if [[ -z "$checksum" ]]; then
              echo "Error: Missing checksum" >&2
              exit 1
            fi
            if ! [[ "$checksum" =~ ^[a-f0-9]{64}$ ]]; then
              echo "Error: Invalid SHA256 format: $checksum" >&2
              exit 1
            fi
          done

          {
            echo "linux_x64=${LINUX_X64}"
            echo "macos_x64=${MACOS_X64}"
            echo "macos_arm=${MACOS_ARM}"
          } >> "$GITHUB_OUTPUT"
      - name: Trigger Homebrew formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.release_version }}
          LINUX_X64: ${{ steps.checksums.outputs.linux_x64 }}
          MACOS_X64: ${{ steps.checksums.outputs.macos_x64 }}
          MACOS_ARM: ${{ steps.checksums.outputs.macos_arm }}
        run: |
          gh workflow run update-formula.yml \
            --repo phaedrus1992/homebrew-tap \
            -f "version=${VERSION}" \
            -f "linux_x64=${LINUX_X64}" \
            -f "macos_x64=${MACOS_X64}" \
            -f "macos_arm=${MACOS_ARM}"
