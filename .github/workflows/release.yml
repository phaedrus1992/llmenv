name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: llmenv
            asset_name: llmenv-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-aarch64
    outputs:
      checksums: ${{ steps.checksum.outputs.hashes }}
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd72be0363a5d3b588f4e  # v6.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1cac3dba77a9a4a10ac88d3c5b31e10eeb4dd0e3
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23bce251afb0c3f1aefd855a166a5d37a2c9cdfb
        with:
          cache-on-failure: false
      - name: Build
        run: cargo build --release --target "${{ matrix.target }}"
      - name: Strip binary
        run: strip "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" || true
      - name: Create asset directory
        run: mkdir -p assets
      - name: Copy binary
        run: cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
          "assets/${{ matrix.asset_name }}"
      - name: Compute SHA256
        id: checksum
        run: |
          cd assets
          sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          echo "hashes=$(cat "${{ matrix.asset_name }}.sha256")" >> $GITHUB_OUTPUT
      - name: Upload binary artifact
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9179  # v4.1.2
        with:
          name: ${{ matrix.asset_name }}
          path: assets/${{ matrix.asset_name }}
      - name: Upload checksum artifact
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9179  # v4.1.2
        with:
          name: ${{ matrix.asset_name }}-sha256
          path: assets/${{ matrix.asset_name }}.sha256
      - name: Generate SLSA provenance
        id: slsa
        env:
          ARTIFACT_NAME: ${{ matrix.asset_name }}
          GH_REF: ${{ github.ref }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACT_HASH=$(sha256sum assets/"${ARTIFACT_NAME}" | awk '{print $1}')
          PROVENANCE_FILE="${ARTIFACT_NAME}.intoto.jsonl"

          python3 << 'PYTHON_EOF'
          import json
          import datetime
          import os

          artifact_hash = os.environ['ARTIFACT_HASH']
          artifact_name = os.environ['ARTIFACT_NAME']
          gh_ref = os.environ['GH_REF']
          gh_repo = os.environ['GH_REPO']
          gh_sha = os.environ['GH_SHA']
          gh_run_id = os.environ['GH_RUN_ID']

          provenance = {
            '_type': 'https://slsa.dev/provenance/v1',
            'subject': [{'name': artifact_name, 'digest': {'sha256': artifact_hash}}],
            'predicateType': 'https://slsa.dev/provenance/v1',
            'predicate': {
              'buildDefinition': {
                'buildType': 'https://github.com/slsa-framework/slsa-github-generator/blob/main/internal/builders/docker/v1',
                'externalParameters': {
                  'workflow': {
                    'path': '.github/workflows/release.yml',
                    'ref': gh_ref,
                    'repository': gh_repo
                  }
                },
                'internalParameters': {'source-commit': gh_sha},
                'resolvedDependencies': []
              },
              'runDetails': {
                'builder': {'id': 'https://github.com/slsa-framework/slsa-github-generator/releases/tag/v2.0.0'},
                'buildMetadata': {
                  'invocationId': gh_run_id,
                  'startedOn': datetime.datetime.utcnow().isoformat() + 'Z',
                  'completedOn': datetime.datetime.utcnow().isoformat() + 'Z'
                },
                'byproducts': []
              }
            }
          }
          with open(os.environ['PROVENANCE_FILE'], 'w') as f:
            json.dump(provenance, f)
          PYTHON_EOF

          echo "provenance_file=${PROVENANCE_FILE}" >> $GITHUB_OUTPUT
          echo "ARTIFACT_HASH=${ARTIFACT_HASH}" >> $GITHUB_ENV
      - name: Upload provenance artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-provenance
          path: ${{ steps.slsa.outputs.provenance_file }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd72be0363a5d3b588f4e  # v6.4.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1cac3dba77a9a4a10ac88d3c5b31e10eeb4dd0e3
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    outputs:
      release_version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd72be0363a5d3b588f4e  # v6.4.0
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@65a9edc5881444af0b3872cd0cbb87b1d723d535  # v4.1.7
        with:
          path: assets
      - name: Prepare release assets
        run: |
          mkdir -p release-assets checksums provenance
          find assets -type f -name 'llmenv-*' ! -name '*.sha256' ! -name '*.intoto.jsonl' \
            -exec mv {} release-assets/ \;
          find assets -type f -name '*.sha256' -exec mv {} checksums/ \;
          find assets -type f -name '*.intoto.jsonl' -exec mv {} provenance/ \;
          cd checksums && cat *.sha256 > checksums.txt && cd ..
      - name: Extract version from tag
        id: extract_version
        run: |
          if [[ ! "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "Error: Not a release tag" >&2
            exit 1
          fi
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@d3bbd6494e50145444b0219a39a90f00b0f01dab  # v1.0.6
        with:
          files: |
            release-assets/llmenv-*
            checksums/checksums.txt
            provenance/*.intoto.jsonl
          draft: false
          prerelease: false
          body: |
            ## Binary Checksums

            Verify binary integrity:
            ```bash
            sha256sum -c checksums.txt
            ```

            ## Supply Chain Security

            SLSA v1.0 provenance attestations are included in this release. Verify authenticity:
            ```bash
            slsa-verifier verify-artifact --artifact-path=<binary> --provenance=<provenance.intoto.jsonl> --source-uri=github.com/phaedrus1992/llmenv
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd72be0363a5d3b588f4e  # v6.4.0
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@65a9edc5881444af0b3872cd0cbb87b1d723d535  # v4.1.7
        with:
          path: artifacts
      - name: Extract and validate checksums
        id: checksums
        run: |
          # Extract checksums with validation
          LINUX_X64=$(grep -h -F 'llmenv-linux-x86_64' \
            "artifacts/llmenv-linux-x86_64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          MACOS_X64=$(grep -h -F 'llmenv-macos-x86_64' \
            "artifacts/llmenv-macos-x86_64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          MACOS_ARM=$(grep -h -F 'llmenv-macos-aarch64' \
            "artifacts/llmenv-macos-aarch64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')

          # Validate all checksums present and format (64 hex digits)
          for checksum in "$LINUX_X64" "$MACOS_X64" "$MACOS_ARM"; do
            if [[ -z "$checksum" ]]; then
              echo "Error: Missing checksum" >&2
              exit 1
            fi
            if ! [[ "$checksum" =~ ^[a-f0-9]{64}$ ]]; then
              echo "Error: Invalid SHA256 format: $checksum" >&2
              exit 1
            fi
          done

          echo "linux_x64=${LINUX_X64}" >> $GITHUB_OUTPUT
          echo "macos_x64=${MACOS_X64}" >> $GITHUB_OUTPUT
          echo "macos_arm=${MACOS_ARM}" >> $GITHUB_OUTPUT
      - name: Trigger Homebrew formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.release_version }}"
          LINUX_X64="${{ steps.checksums.outputs.linux_x64 }}"
          MACOS_X64="${{ steps.checksums.outputs.macos_x64 }}"
          MACOS_ARM="${{ steps.checksums.outputs.macos_arm }}"

          gh workflow run update-formula.yml \
            --repo phaedrus1992/homebrew-tap \
            -f "version=${VERSION}" \
            -f "linux_x64=${LINUX_X64}" \
            -f "macos_x64=${MACOS_X64}" \
            -f "macos_arm=${MACOS_ARM}"
