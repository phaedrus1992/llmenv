name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: llmenv
            asset_name: llmenv-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-aarch64
    outputs:
      checksums: ${{ steps.checksum.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1cac3dba77a9a4a10ac88d3c5b31e10eeb4dd0e3
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23bce251afb0c3f1aefd855a166a5d37a2c9cdfb
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }} || true
      - name: Create asset directory
        run: mkdir -p assets
      - name: Copy binary
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} assets/${{ matrix.asset_name }}
      - name: Compute SHA256
        id: checksum
        run: |
          cd assets
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          echo "hashes=$(cat ${{ matrix.asset_name }}.sha256)" >> $GITHUB_OUTPUT
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: assets/${{ matrix.asset_name }}
      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-sha256
          path: assets/${{ matrix.asset_name }}.sha256

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1cac3dba77a9a4a10ac88d3c5b31e10eeb4dd0e3
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
      - name: Prepare release assets
        run: |
          mkdir -p release-assets checksums
          find assets -type f -name 'llmenv-*' ! -name '*.sha256' -exec mv {} release-assets/ \;
          find assets -type f -name '*.sha256' -exec mv {} checksums/ \;
          cd checksums && cat *.sha256 > checksums.txt && cd ..
      - name: Create Release
        uses: softprops/action-gh-release@d3bbd6494e50145444b0219a39a90f00b0f01dab
        with:
          files: |
            release-assets/llmenv-*
            checksums/checksums.txt
          draft: false
          prerelease: false
          body: |
            ## Binary Checksums

            Verify binary integrity:
            ```bash
            sha256sum -c checksums.txt
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
