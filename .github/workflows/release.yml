name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: llmenv
            asset_name: llmenv-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: llmenv
            asset_name: llmenv-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: llmenv
            asset_name: llmenv-macos-aarch64
    outputs:
      checksums: ${{ steps.checksum.outputs.hashes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install cross-compile target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "${TARGET}"
      # No build cache here on purpose: this workflow only runs on `v*` tag
      # pushes, and release binaries are built from a clean checkout so the
      # published artifact can't inherit a poisoned cache entry.
      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "${TARGET}"
      - name: Strip binary
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: strip "target/${TARGET}/release/${ARTIFACT_NAME}" || true
      - name: Create asset directory
        run: mkdir -p assets
      - name: Copy binary
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: cp "target/${TARGET}/release/${ARTIFACT_NAME}" "assets/${ASSET_NAME}"
      - name: Compute SHA256
        id: checksum
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          cd assets
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          {
            echo "hashes<<EOF"
            cat "${ASSET_NAME}.sha256"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: assets/${{ matrix.asset_name }}
      - name: Upload checksum artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}-sha256
          path: assets/${{ matrix.asset_name }}.sha256
      - name: Generate SLSA provenance
        id: slsa
        env:
          ARTIFACT_NAME: ${{ matrix.asset_name }}
          GH_REF: ${{ github.ref }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACT_HASH=$(sha256sum assets/"${ARTIFACT_NAME}" | awk '{print $1}')
          export ARTIFACT_HASH
          PROVENANCE_FILE="${ARTIFACT_NAME}.intoto.jsonl"
          export PROVENANCE_FILE

          python3 << 'PYTHON_EOF'
          import json
          import datetime
          import os

          artifact_hash = os.environ['ARTIFACT_HASH']
          artifact_name = os.environ['ARTIFACT_NAME']
          gh_ref = os.environ['GH_REF']
          gh_repo = os.environ['GH_REPO']
          gh_sha = os.environ['GH_SHA']
          gh_run_id = os.environ['GH_RUN_ID']

          provenance = {
            '_type': 'https://slsa.dev/provenance/v1',
            'subject': [{'name': artifact_name, 'digest': {'sha256': artifact_hash}}],
            'predicateType': 'https://slsa.dev/provenance/v1',
            'predicate': {
              'buildDefinition': {
                'buildType': 'https://github.com/slsa-framework/slsa-github-generator/blob/main/internal/builders/docker/v1',
                'externalParameters': {
                  'workflow': {
                    'path': '.github/workflows/release.yml',
                    'ref': gh_ref,
                    'repository': gh_repo
                  }
                },
                'internalParameters': {'source-commit': gh_sha},
                'resolvedDependencies': []
              },
              'runDetails': {
                'builder': {'id': 'https://github.com/slsa-framework/slsa-github-generator/releases/tag/v2.0.0'},
                'buildMetadata': {
                  'invocationId': gh_run_id,
                  'startedOn': datetime.datetime.utcnow().isoformat() + 'Z',
                  'completedOn': datetime.datetime.utcnow().isoformat() + 'Z'
                },
                'byproducts': []
              }
            }
          }
          with open(os.environ['PROVENANCE_FILE'], 'w') as f:
            json.dump(provenance, f)
          PYTHON_EOF

          echo "provenance_file=${PROVENANCE_FILE}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_HASH=${ARTIFACT_HASH}" >> "$GITHUB_ENV"
      - name: Upload provenance artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}-provenance
          path: ${{ steps.slsa.outputs.provenance_file }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: stable
      - name: Extract version from tag
        id: version
        env:
          GH_REF: ${{ github.ref }}
        run: |
          VERSION="${GH_REF#refs/tags/v}"
          # Constrain to a version-shaped token so it can't smuggle path or shell
          # metacharacters into the crates.io URL below.
          if [[ ! "${GH_REF}" =~ ^refs/tags/v ]] || [[ ! "${VERSION}" =~ ^[0-9A-Za-z.+-]+$ ]]; then
            echo "Error: not a valid release tag: ${GH_REF}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          # Fail fast if any workspace crate's version doesn't match the tag.
          # Catches the case where `cargo release --workspace` was not used and
          # sub-crates were left at the old version.
          validate_versions() {
            local tag_version="$1" errors=0 actual
            for crate in llmenv llmenv-util llmenv-paths llmenv-git llmenv-config; do
              actual=$(cargo metadata --no-deps --format-version 1 | \
                jq -r --arg n "$crate" '.packages[] | select(.name == $n) | .version')
              if [[ "${actual}" != "${tag_version}" ]]; then
                echo "Error: ${crate} Cargo.toml version (${actual}) != tag version (${tag_version})" >&2
                errors=$((errors + 1))
              fi
            done
            if [[ ${errors} -gt 0 ]]; then
              echo "Run 'cargo release <level> --workspace --execute' to bump all crates together." >&2
              exit 1
            fi
          }
          validate_versions "${VERSION}"

          # Idempotent publish for one crate. Skips if already on crates.io (for
          # re-pushed tags); errors on unexpected HTTP status.
          publish_crate() {
            local crate="$1" version="$2" status
            status=$(curl -sS -A 'llmenv-release-workflow' -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/${crate}/${version}")
            case "${status}" in
              200) echo "${crate} ${version} already on crates.io; skipping." ;;
              404) cargo publish --no-verify --package "${crate}" ;;
              *)
                echo "Error: unexpected crates.io status ${status} for ${crate} ${version}" >&2
                exit 1
                ;;
            esac
          }

          # Poll crates.io until the crate version is indexed (needed before
          # publishing a crate that depends on it). First-time crates can take
          # 10+ minutes to index; timeout after 15 minutes.
          wait_for_crate() {
            local crate="$1" version="$2" elapsed=0 status
            echo "Waiting for ${crate} ${version} to be indexed by crates.io..."
            while true; do
              status=$(curl -sS -A 'llmenv-release-workflow' -o /dev/null -w '%{http_code}' \
                "https://crates.io/api/v1/crates/${crate}/${version}")
              [[ "${status}" == "200" ]] && { echo "${crate} ${version} is available."; return 0; }
              [[ ${elapsed} -ge 900 ]] && {
                echo "Error: timed out after 900s waiting for ${crate} ${version}" >&2
                exit 1
              }
              sleep 20
              elapsed=$((elapsed + 20))
            done
          }

          # Publish the three independent sub-crates first (no internal deps between them).
          publish_crate "llmenv-util"   "${VERSION}"
          publish_crate "llmenv-paths"  "${VERSION}"
          publish_crate "llmenv-git"    "${VERSION}"

          # Wait for crates.io to index them before publishing dependents.
          wait_for_crate "llmenv-util"   "${VERSION}"
          wait_for_crate "llmenv-paths"  "${VERSION}"
          wait_for_crate "llmenv-git"    "${VERSION}"

          # llmenv-config depends on llmenv-paths.
          publish_crate "llmenv-config" "${VERSION}"
          wait_for_crate "llmenv-config" "${VERSION}"

          # Root crate depends on all four sub-crates.
          publish_crate "llmenv" "${VERSION}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: write
    outputs:
      release_version: ${{ steps.extract_version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: assets
      - name: Prepare release assets
        run: |
          mkdir -p release-assets checksums provenance
          find assets -type f -name 'llmenv-*' ! -name '*.sha256' ! -name '*.intoto.jsonl' \
            -exec mv {} release-assets/ \;
          find assets -type f -name '*.sha256' -exec mv {} checksums/ \;
          find assets -type f -name '*.intoto.jsonl' -exec mv {} provenance/ \;
          cd checksums && cat -- *.sha256 > checksums.txt && cd ..
      - name: Extract version from tag
        id: extract_version
        env:
          GH_REF: ${{ github.ref }}
        run: |
          if [[ ! "${GH_REF}" =~ ^refs/tags/v ]]; then
            echo "Error: Not a release tag" >&2
            exit 1
          fi
          VERSION="${GH_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build release body
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Extract changelog section for this version. Use index() for literal
          # match so version dots aren't treated as awk regex metacharacters.
          # $0 is an awk field variable; SC2016 fires because it sees $ in single quotes.
          # shellcheck disable=SC2016
          awk -v ver="[${VERSION}]" '
            index($0, "## " ver) == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/./,$!d' > changelog-notes.txt

          # Reflow prose paragraphs for readable GitHub release notes (#320).
          if [[ ! -s changelog-notes.txt ]]; then
            echo "Bug fixes or process changes only, no user-facing changes." > changelog-notes.txt
          fi
          if ! python3 scripts/reflow-markdown.py \
               < changelog-notes.txt > changelog-notes-reflowed.txt \
               || [[ ! -s changelog-notes-reflowed.txt ]]; then
            echo "ERROR: reflow failed or produced empty output; using original notes" >&2
            cp changelog-notes.txt changelog-notes-reflowed.txt
          fi

          # Raw git log between the previous tag and this one, formatted as markdown bullets
          # with linked short SHAs.
          CURRENT_TAG="v${VERSION}"
          REPO_URL="https://github.com/${GH_REPO}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          if [[ -n "${PREV_TAG}" ]]; then
            LOG_RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            LOG_RANGE="${CURRENT_TAG}"
          fi
          git log --pretty=format:"- %s ([%h](${REPO_URL}/commit/%H))" "${LOG_RANGE}" \
            > git-log.md

          {
            cat changelog-notes-reflowed.txt
            echo ""
            echo "## Commits"
            echo ""
            cat git-log.md
            echo ""
            echo "## Binary Checksums"
            echo ""
            echo '```'
            cat checksums/checksums.txt
            echo '```'
            echo ""
            echo "Verify integrity:"
            echo '```bash'
            echo "sha256sum -c checksums.txt"
            echo '```'
            echo ""
            echo "## Supply Chain Security"
            echo ""
            echo "SLSA v1.0 provenance attestations included. Verify:"
            echo '```bash'
            echo "slsa-verifier verify-artifact --artifact-path=<binary> --provenance=<provenance.intoto.jsonl> --source-uri=github.com/phaedrus1992/llmenv"
            echo '```'
          } > release-body.md
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # `gh release` ships with the runner, so we avoid a third-party action.
          # Stay idempotent for a re-pushed tag (mirrors the crates.io publish
          # step): update an existing release in place instead of hard-failing.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --notes-file release-body.md --latest
            gh release upload "${TAG}" --clobber \
              release-assets/llmenv-* \
              checksums/checksums.txt \
              provenance/*.intoto.jsonl
          else
            gh release create "${TAG}" \
              release-assets/llmenv-* \
              checksums/checksums.txt \
              provenance/*.intoto.jsonl \
              --title "${TAG}" \
              --notes-file release-body.md \
              --verify-tag \
              --latest
          fi

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [publish-crate, create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
      - name: Extract and validate checksums
        id: checksums
        run: |
          # Extract checksums with validation
          LINUX_X64=$(grep -h -F 'llmenv-linux-x86_64' \
            "artifacts/llmenv-linux-x86_64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          LINUX_ARM=$(grep -h -F 'llmenv-linux-aarch64' \
            "artifacts/llmenv-linux-aarch64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          MACOS_X64=$(grep -h -F 'llmenv-macos-x86_64' \
            "artifacts/llmenv-macos-x86_64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')
          MACOS_ARM=$(grep -h -F 'llmenv-macos-aarch64' \
            "artifacts/llmenv-macos-aarch64-sha256"/*.sha256 2>/dev/null | awk '{print $1}')

          # Validate all checksums present and format (64 hex digits)
          for checksum in "$LINUX_X64" "$LINUX_ARM" "$MACOS_X64" "$MACOS_ARM"; do
            if [[ -z "$checksum" ]]; then
              echo "Error: Missing checksum" >&2
              exit 1
            fi
            if ! [[ "$checksum" =~ ^[a-f0-9]{64}$ ]]; then
              echo "Error: Invalid SHA256 format: $checksum" >&2
              exit 1
            fi
          done

          {
            echo "linux_x64=${LINUX_X64}"
            echo "linux_arm=${LINUX_ARM}"
            echo "macos_x64=${MACOS_X64}"
            echo "macos_arm=${MACOS_ARM}"
          } >> "$GITHUB_OUTPUT"
      - name: Trigger Homebrew formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.release_version }}
          LINUX_X64: ${{ steps.checksums.outputs.linux_x64 }}
          LINUX_ARM: ${{ steps.checksums.outputs.linux_arm }}
          MACOS_X64: ${{ steps.checksums.outputs.macos_x64 }}
          MACOS_ARM: ${{ steps.checksums.outputs.macos_arm }}
        run: |
          gh workflow run update-formula.yml \
            --repo phaedrus1992/homebrew-tap \
            -f "version=${VERSION}" \
            -f "linux_x64=${LINUX_X64}" \
            -f "linux_arm=${LINUX_ARM}" \
            -f "macos_x64=${MACOS_X64}" \
            -f "macos_arm=${MACOS_ARM}"
