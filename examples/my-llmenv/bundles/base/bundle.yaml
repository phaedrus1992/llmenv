# Capability fragment for the `base` bundle.
#
# Hook commands use absolute paths to this bundle's source. Once
# llmenv issue #162 lands (bundle-relative path resolution at materialize
# time), these can be rewritten to relative paths like `hooks/foo.sh`.

hooks:
  - event: PostToolUse
    handler:
      type: command
      command: "bash ${HOME}/git/my-llmenv/bundles/base/hooks/session-log.sh"


mcp:
  - name: codebase-memory-mcp
    type: stdio
    command: "${HOME}/.local/bin/codebase-memory-mcp"
