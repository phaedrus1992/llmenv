# Capability fragment for the `host-laptop` bundle.
#
# This bundle fires only on the personal laptop (host-studio tag from the
# `studio` host scope in config.yaml). It contains hooks that depend on
# binaries installed only on that machine.
#
# WHY A SEPARATE BUNDLE:
#   Putting host-specific hooks in the universal `base` bundle would cause
#   them to fire on every machine, where the binaries don't exist, causing
#   hook errors on every tool call. Instead, each machine gets its own
#   bundle that only loads when that machine's host tag is active.
#
# PORTABILITY NOTE:
#   If you add a second machine, create bundles/host-tower/bundle.yaml for
#   it. The config.yaml `bundle:` section maps each host tag to its bundle.
#
# BINARIES REQUIRED ON THIS HOST:
#   rtk              — Rust Token Killer (llmenv token-usage proxy)
#   claude-control   — External session monitor with a status dashboard
#     Hooks: ${HOME}/.claude-control/hooks/status-hook.sh

hooks:
  # rtk (Rust Token Killer) — transparently rewrites Bash invocations through
  # the rtk proxy, which filters redundant output before it reaches Claude's
  # context. Achieves 60-90% token savings on verbose commands like git log,
  # cargo test, etc.
  #
  # HOW IT WORKS:
  #   This PreToolUse hook intercepts every Bash call. rtk reads the command
  #   from the tool input, runs it, filters the output, and returns the
  #   filtered result. From Claude's perspective the tool call looks identical;
  #   the token savings happen transparently in the output.
  #
  # Example: `git log --oneline -20` output before rtk ~2000 tokens;
  #          after rtk filtering ~300 tokens.
  - event: PreToolUse
    matcher: Bash
    handler:
      type: command
      command: "rtk hook claude"

  # claude-control status dashboard — emits session state (active/idle/stopped)
  # to an external monitor process. The monitor displays a real-time dashboard
  # showing which sessions are running and what they're doing.
  #
  # async + short timeout: these hooks are best-effort. If claude-control is
  # not running or the hook times out, the session continues normally.
  # Claude Code will surface hook errors as warnings, not failures.
  #
  # The same script handles all four events; it reads the event type from
  # the payload and updates the dashboard accordingly.
  - event: SessionStart
    handler:
      type: command
      command: "${HOME}/.claude-control/hooks/status-hook.sh"
  - event: SessionEnd
    handler:
      type: command
      command: "${HOME}/.claude-control/hooks/status-hook.sh"
  - event: Stop
    handler:
      type: command
      command: "${HOME}/.claude-control/hooks/status-hook.sh"
  - event: UserPromptSubmit
    handler:
      type: command
      command: "${HOME}/.claude-control/hooks/status-hook.sh"
