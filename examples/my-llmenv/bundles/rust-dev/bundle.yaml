env:
  CARGO_TERM_COLOR: "always"
  RUST_BACKTRACE: "1"
  RUSTC_WRAPPER: "sccache"

permissions:
  allow:
    - { tool: Bash, pattern: "cargo *" }
    - { tool: Bash, pattern: "rustc --version" }
    - { tool: Bash, pattern: "cat ~/.cargo/*" }
    - { tool: Read, paths: ["~/.cargo/**"] }

# Capability fragment for the `rust-dev` bundle. Fires for the `rust` tag.

hooks:
  # Auto-clippy on every Rust edit. Quiet + head-truncated so the hook
  # doesn't spam terminal output; warnings still surface to the agent.
  - event: PostToolUse
    matcher: "*.rs"
    handler:
      type: command
      command: "cargo clippy --quiet 2>&1 | head -20"
