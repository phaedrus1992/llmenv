# Capability fragment for the `work` bundle. Fires on the `work` tag emitted by
# the work-laptop host scope. Pairs with the `work` plugin-collection,
# which wires up the official Slack MCP plugin (claude-plugins-official:slack).
#
# Read-only MCP tools allowed by default so work-host sessions don't prompt on
# every query. Write tools (send/create/update/delete/schedule/react) are
# deliberately omitted — they stay prompt-gated.
#
# These are raw Claude permission strings under `native_permissions` because the
# neutral permission vocabulary can't represent MCP tool grants (see the
# `native_permissions` note in config.yaml).

native_permissions:
  claude_code:
    allow:
      # --- grid MCP (company-wide index) — read-only tools ----------------
      # fathom (call recordings / transcripts)
      - "mcp__grid__fathom_list_calls"
      - "mcp__grid__fathom_read_call"
      - "mcp__grid__fathom_read_transcript"
      - "mcp__grid__fathom_search_calls"
      - "mcp__grid__fathom_search_transcripts"
      # google drive
      - "mcp__grid__gdrive_list_files"
      - "mcp__grid__gdrive_list_folders"
      - "mcp__grid__gdrive_list_shared_drives"
      - "mcp__grid__gdrive_read_file"
      - "mcp__grid__gdrive_search"
      # github
      - "mcp__grid__github_get_issue_comments"
      - "mcp__grid__github_list_deployments"
      - "mcp__grid__github_list_discussions"
      - "mcp__grid__github_list_issues"
      - "mcp__grid__github_list_prs"
      - "mcp__grid__github_list_releases"
      - "mcp__grid__github_list_repos"
      - "mcp__grid__github_list_workflow_runs"
      - "mcp__grid__github_read_discussion"
      - "mcp__grid__github_read_file"
      - "mcp__grid__github_read_issue"
      - "mcp__grid__github_read_pr"
      - "mcp__grid__github_read_release"
      - "mcp__grid__github_search"
      - "mcp__grid__github_search_code"
      # grid meta
      - "mcp__grid__grid_find_similar_tool"
      - "mcp__grid__grid_get_context"
      - "mcp__grid__grid_list_integrations_tool"
      - "mcp__grid__grid_query"
      - "mcp__grid__grid_search_tool"
      # hubspot
      - "mcp__grid__hubspot_list_activities"
      - "mcp__grid__hubspot_list_companies"
      - "mcp__grid__hubspot_list_contacts"
      - "mcp__grid__hubspot_list_deals"
      - "mcp__grid__hubspot_read_activity"
      - "mcp__grid__hubspot_read_company"
      - "mcp__grid__hubspot_read_contact"
      - "mcp__grid__hubspot_read_deal"
      - "mcp__grid__hubspot_search_activities"
      # linear
      - "mcp__grid__linear_get_issue_comments"
      - "mcp__grid__linear_list_initiatives"
      - "mcp__grid__linear_list_issues"
      - "mcp__grid__linear_list_projects"
      - "mcp__grid__linear_list_teams"
      - "mcp__grid__linear_read_issue"
      - "mcp__grid__linear_search_issues"
      # notion
      - "mcp__grid__notion_get_page_blocks"
      - "mcp__grid__notion_get_recent_changes"
      - "mcp__grid__notion_list_databases"
      - "mcp__grid__notion_list_pages"
      - "mcp__grid__notion_query_database"
      - "mcp__grid__notion_read_page"
      - "mcp__grid__notion_search"
      # pylon
      - "mcp__grid__pylon_list_accounts"
      - "mcp__grid__pylon_list_contacts"
      - "mcp__grid__pylon_list_issues"
      - "mcp__grid__pylon_list_threads"
      - "mcp__grid__pylon_read_account"
      - "mcp__grid__pylon_read_issue"
      - "mcp__grid__pylon_read_thread"
      - "mcp__grid__pylon_search_issues"
      # slack (via grid index)
      - "mcp__grid__slack_list_channels"
      - "mcp__grid__slack_read_channel_history"
      - "mcp__grid__slack_search_messages"
      # vitally
      - "mcp__grid__vitally_get_at_risk_accounts"
      - "mcp__grid__vitally_get_custom_object_instance"
      - "mcp__grid__vitally_get_health_score"
      - "mcp__grid__vitally_get_health_trend"
      - "mcp__grid__vitally_get_project"
      - "mcp__grid__vitally_list_accounts"
      - "mcp__grid__vitally_list_custom_object_instances"
      - "mcp__grid__vitally_list_custom_object_types"
      - "mcp__grid__vitally_list_custom_traits"
      - "mcp__grid__vitally_list_notes"
      - "mcp__grid__vitally_list_nps"
      - "mcp__grid__vitally_list_projects"
      - "mcp__grid__vitally_list_tasks"
      - "mcp__grid__vitally_read_account"
      - "mcp__grid__vitally_read_note"
      - "mcp__grid__vitally_read_task"
      - "mcp__grid__vitally_search_accounts"
